theme: jekyll-theme-cayman

# This repository is a LaTeX book, not a Jekyll website. GitHub Pages was
# failing because Jekyll tried to render the whole source tree (hundreds of
# .tex files and .md notes, some containing Liquid-like {{ }} / {% %} braces
# that break Jekyll's parser). We publish only the top-level landing pages
# (README.md, acknowledgements.md) and exclude everything else from the build.
exclude:
  - ClassNotes
  - Intro-Math-Programming
  - install-tl-20260116
  - instructive-code
  - open-optimization-bibliography
  - open-optimization-common
  - open-optimization-or-examples
  - LICENSE-ISSUES.md
  - Makefile
  - "*.tex"
  - "*.docx"
  - "*.pdf"
  - vendor
  - .github
